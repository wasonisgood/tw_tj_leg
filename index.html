<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>轉型正義立法歷程 - AI Data Exploration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
      (function () {
        var redirect = sessionStorage.getItem('gh-pages-spa-redirect');
        if (!redirect) return;

        sessionStorage.removeItem('gh-pages-spa-redirect');
        var target = redirect.replace(/\/+$/, '');
        var current = window.location.pathname + window.location.search + window.location.hash;

        if (target && target !== current) {
          window.history.replaceState(null, '', target);
        }
      })();
    </script>
  </head>
  <body class="bg-black text-white antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
