name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 或者是您的開發分支名稱

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 預設輸出目錄
          branch: gh-pages # 建議部屬到 gh-pages，然後在設定中指定此分支
